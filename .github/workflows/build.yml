name: Build SAATIRIL Windows App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      - name: Build Electron Windows app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Windows-Setup
          path: dist-electron/*.exe
          retention-days: 30

      - name: Upload portable build (if exists)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SAATIRIL-Windows-Portable
          path: dist-electron/*.blockmap
          retention-days: 7
