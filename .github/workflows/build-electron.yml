name: Build Electron Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Enable Next.js static export
        shell: pwsh
        run: |
          $configPath = "next.config.ts"
          $content = Get-Content $configPath -Raw
          $content = $content -replace '// output: "export",', 'output: "export",'
          Set-Content $configPath $content -NoNewline
          Write-Host "Enabled static export in next.config.ts"

      - name: Remove API route (incompatible with static export)
        shell: pwsh
        run: |
          $apiDir = "src/app/api"
          if (Test-Path $apiDir) {
            Remove-Item -Recurse -Force $apiDir
            Write-Host "Removed $apiDir"
          }

      - name: Build Next.js (static export)
        run: npx next build
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export output
        shell: pwsh
        run: |
          if (Test-Path "out/index.html") {
            $fileCount = (Get-ChildItem "out" -Recurse -File).Count
            Write-Host "Static export OK ($fileCount files)"
          } else {
            Write-Error "out/index.html NOT found!"
            exit 1
          }

      - name: Compile Electron TypeScript
        run: npx tsc -p electron/tsconfig.json

      - name: Prune devDependencies before packaging
        run: npm prune --production
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Verify production node_modules
        shell: pwsh
        run: |
          Write-Host "=== Production node_modules ==="
          if (Test-Path "node_modules") {
            $prodDeps = Get-ChildItem "node_modules" -Directory | Where-Object { $_.Name -notmatch '^\.|^@' -or ($_.Name -eq '@types') }
            $topLevelCount = (Get-ChildItem "node_modules" -Directory).Count
            $totalSize = (Get-ChildItem "node_modules" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "Top-level packages: $topLevelCount"
            Write-Host "Total size: $([math]::Round($totalSize, 2)) MB"
            Write-Host ""
            Write-Host "Top-level directories:"
            Get-ChildItem "node_modules" -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Error "node_modules NOT found after prune!"
            exit 1
          }

      - name: Verify source directories for packaging
        shell: pwsh
        run: |
          foreach ($d in @("out", "public")) {
            if (Test-Path $d) {
              $count = (Get-ChildItem $d -Recurse -File).Count
              Write-Host "$d : $count files - OK"
            } else {
              Write-Error "$d : NOT FOUND!"
              exit 1
            }
          }

      - name: Build Electron app (Windows - NSIS + Portable)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged app structure
        shell: pwsh
        run: |
          Write-Host "=== Verifying packaged app (asar:false) ==="
          $appDir = "dist-electron\win-unpacked\resources\app"
          if (Test-Path $appDir) {
            Write-Host "App directory found (asar:false confirmed): $appDir"
            Get-ChildItem $appDir | Format-Table Name, Length
            # Verify critical directories exist inside app/
            $outDir = Join-Path $appDir "out"
            $publicDir = Join-Path $appDir "public"
            $electronDir = Join-Path $appDir "electron"
            $nodeModulesDir = Join-Path $appDir "node_modules"

            if (Test-Path $outDir) {
              $count = (Get-ChildItem $outDir -Recurse -File).Count
              Write-Host "  out/ : $count files - OK"
            } else {
              Write-Error "  out/ : NOT FOUND! App will fail to start!"
              exit 1
            }
            if (Test-Path $publicDir) {
              Write-Host "  public/ : OK"
            } else {
              Write-Error "  public/ : NOT FOUND!"
              exit 1
            }
            if (Test-Path $electronDir) {
              Write-Host "  electron/ : OK"
              if (Test-Path (Join-Path $electronDir "main.js")) {
                Write-Host "  electron/main.js : OK"
              } else {
                Write-Error "  electron/main.js : NOT FOUND!"
                exit 1
              }
            } else {
              Write-Error "  electron/ : NOT FOUND!"
              exit 1
            }
            if (Test-Path $nodeModulesDir) {
              $nmSize = (Get-ChildItem $nodeModulesDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
              $nmCount = (Get-ChildItem $nodeModulesDir -Directory).Count
              Write-Host "  node_modules/ : $nmCount top-level packages, $([math]::Round($nmSize, 2)) MB - OK"
              # Verify socket.io is present
              if (Test-Path (Join-Path $nodeModulesDir "socket.io")) {
                Write-Host "  node_modules/socket.io : OK"
              } else {
                Write-Error "  node_modules/socket.io : NOT FOUND! App will crash on startup!"
                exit 1
              }
            } else {
              Write-Warning "  node_modules/ : NOT FOUND (may be OK if socket.io is bundled)"
            }
            # Verify index.html exists for the static server
            if (Test-Path (Join-Path $outDir "index.html")) {
              Write-Host "  out/index.html : OK"
            } else {
              Write-Error "  out/index.html : NOT FOUND! Static server will fail!"
              exit 1
            }
            # Report total app size
            $appSize = (Get-ChildItem $appDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host ""
            Write-Host "  Total app/ size: $([math]::Round($appSize, 2)) MB"
          } else {
            # Fallback: check for app.asar (shouldn't happen with asar:false)
            Write-Warning "No app directory found - checking for asar..."
            $asarPath = "dist-electron\win-unpacked\resources\app.asar"
            if (Test-Path $asarPath) {
              Write-Error "app.asar found! asar:false is NOT working correctly!"
              exit 1
            } else {
              Write-Error "No app directory or app.asar found!"
              exit 1
            }
          }

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Build Artifacts ==="
          if (Test-Path "dist-electron") {
            Get-ChildItem "dist-electron" -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - $sizeMB MB"
            }
          }

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Setup
          path: dist-electron/SAATIRIL-Fullset-*-Setup.exe
          if-no-files-found: warn

      - name: Upload Portable Executable
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Portable
          path: dist-electron/SAATIRIL-Fullset-*-Portable.exe
          if-no-files-found: warn

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-All-Artifacts
          path: dist-electron/*
          if-no-files-found: warn
