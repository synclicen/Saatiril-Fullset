name: Build Electron Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Enable Next.js static export
        shell: pwsh
        run: |
          $configPath = "next.config.ts"
          $content = Get-Content $configPath -Raw
          $content = $content -replace '// output: "export",', 'output: "export",'
          Set-Content $configPath $content -NoNewline
          Write-Host "Enabled static export in next.config.ts"

      - name: Remove API route (incompatible with static export)
        shell: pwsh
        run: |
          $apiDir = "src/app/api"
          if (Test-Path $apiDir) {
            Remove-Item -Recurse -Force $apiDir
            Write-Host "Removed $apiDir"
          }

      - name: Build Next.js (static export)
        run: npx next build
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export output
        shell: pwsh
        run: |
          if (Test-Path "out/index.html") {
            $fileCount = (Get-ChildItem "out" -Recurse -File).Count
            Write-Host "Static export OK ($fileCount files)"
          } else {
            Write-Error "out/index.html NOT found!"
            exit 1
          }

      - name: Compile Electron preload (TypeScript)
        run: npx tsc -p electron/tsconfig.json

      - name: Bundle Electron main process with esbuild
        run: |
          npx esbuild electron/main.ts --bundle --platform=node --outfile=electron/main.js --external:electron --external:buffer --external:fs --external:path --external:os --external:http --external:https --external:net --external:crypto --external:stream --external:events --external:url --external:child_process --external:dns --external:tls --external:zlib --external:string_decoder
          Write-Host "Main process bundled with esbuild (socket.io inlined)"

      - name: Verify bundled main.js
        shell: pwsh
        run: |
          $mainJs = "electron/main.js"
          if (Test-Path $mainJs) {
            $size = (Get-Item $mainJs).Length / 1KB
            Write-Host "electron/main.js : $([math]::Round($size, 1)) KB - OK"
            # Verify socket.io is bundled inside
            $content = Get-Content $mainJs -Raw
            if ($content -match "SocketIOServer" -or $content -match "socket\.io") {
              Write-Host "socket.io is bundled inside main.js - OK"
            } else {
              Write-Warning "socket.io may not be bundled in main.js"
            }
          } else {
            Write-Error "electron/main.js NOT found!"
            exit 1
          }

      - name: Verify source directories for packaging
        shell: pwsh
        run: |
          foreach ($d in @("out", "public")) {
            if (Test-Path $d) {
              $count = (Get-ChildItem $d -Recurse -File).Count
              Write-Host "$d : $count files - OK"
            } else {
              Write-Error "$d : NOT FOUND!"
              exit 1
            }
          }

      - name: Build Electron app (Windows - NSIS + Portable)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged app structure
        shell: pwsh
        run: |
          Write-Host "=== Verifying packaged app (asar:true) ==="
          $asarPath = "dist-electron\win-unpacked\resources\app.asar"
          $appDir = "dist-electron\win-unpacked\resources\app"
          
          if (Test-Path $asarPath) {
            $size = (Get-Item $asarPath).Length / 1MB
            Write-Host "app.asar found: $([math]::Round($size, 2)) MB - OK (asar:true confirmed)"
          } elseif (Test-Path $appDir) {
            Write-Host "app directory found (asar:false fallback): $appDir"
            $appSize = (Get-ChildItem $appDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "  Total app/ size: $([math]::Round($appSize, 2)) MB"
          } else {
            Write-Error "No app.asar or app directory found!"
            exit 1
          }

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Build Artifacts ==="
          if (Test-Path "dist-electron") {
            Get-ChildItem "dist-electron" -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - $sizeMB MB"
            }
          }

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Setup
          path: dist-electron/SAATIRIL-Fullset-*-Setup.exe
          if-no-files-found: warn

      - name: Upload Portable Executable
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Portable
          path: dist-electron/SAATIRIL-Fullset-*-Portable.exe
          if-no-files-found: warn

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-All-Artifacts
          path: dist-electron/*
          if-no-files-found: warn
