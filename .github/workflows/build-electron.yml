name: Build Electron Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Enable Next.js static export
        shell: pwsh
        run: |
          $configPath = "next.config.ts"
          $content = Get-Content $configPath -Raw
          # Uncomment the output: "export" line
          $content = $content -replace '// output: "export",', 'output: "export",'
          Set-Content $configPath $content -NoNewline
          Write-Host "Enabled static export in next.config.ts"
          Write-Host "Content preview:"
          Get-Content $configPath | Select-Object -First 10

      - name: Remove API route (incompatible with static export)
        shell: pwsh
        run: |
          $apiDir = "src/app/api"
          if (Test-Path $apiDir) {
            Remove-Item -Recurse -Force $apiDir
            Write-Host "Removed $apiDir (API routes not supported in static export)"
          } else {
            Write-Host "No API directory found, skipping"
          }

      - name: Build Next.js (static export)
        run: npx next build
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export output
        shell: pwsh
        run: |
          if (Test-Path "out") {
            $fileCount = (Get-ChildItem "out" -Recurse -File).Count
            Write-Host "Static export generated successfully ($fileCount files)"
            Write-Host "Top-level contents:"
            Get-ChildItem "out" | Format-Table Name, Length
            Write-Host "Checking for index.html..."
            if (Test-Path "out/index.html") {
              Write-Host "index.html found - OK"
            } else {
              Write-Error "index.html NOT found in out/ directory!"
              exit 1
            }
          } else {
            Write-Error "Static export directory 'out' not found!"
            exit 1
          }

      - name: Compile Electron TypeScript
        run: npx tsc -p electron/tsconfig.json

      - name: Verify Electron compilation
        shell: pwsh
        run: |
          if ((Test-Path "electron/main.js") -and (Test-Path "electron/preload.js")) {
            Write-Host "Electron TypeScript compiled successfully"
          } else {
            Write-Error "Electron compilation output not found!"
            exit 1
          }

      - name: Verify extraResources directories exist
        shell: pwsh
        run: |
          Write-Host "Checking extraResources directories..."
          $dirs = @("out", "public")
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              $count = (Get-ChildItem $d -Recurse -File).Count
              Write-Host "  $d : $count files - OK"
            } else {
              Write-Error "  $d : NOT FOUND!"
              exit 1
            }
          }

      - name: Build Electron app (Windows - NSIS + Portable)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged resources
        shell: pwsh
        run: |
          Write-Host "=== Verifying packaged app resources ==="
          $unpackedDir = "dist-electron\win-unpacked"
          if (Test-Path $unpackedDir) {
            Write-Host "Unpacked app found at: $unpackedDir"
            $resourcesDir = Join-Path $unpackedDir "resources"
            if (Test-Path $resourcesDir) {
              Write-Host "Resources directory contents:"
              Get-ChildItem $resourcesDir | Format-Table Name, Length
              # Check if 'out' directory exists in resources
              $outDir = Join-Path $resourcesDir "out"
              if (Test-Path $outDir) {
                $outFileCount = (Get-ChildItem $outDir -Recurse -File).Count
                Write-Host "  out/ directory: $outFileCount files - OK"
              } else {
                Write-Warning "  out/ directory NOT found in resources!"
              }
              # Check if 'public' directory exists in resources
              $publicDir = Join-Path $resourcesDir "public"
              if (Test-Path $publicDir) {
                Write-Host "  public/ directory: OK"
              } else {
                Write-Warning "  public/ directory NOT found in resources!"
              }
            } else {
              Write-Warning "No resources directory found!"
            }
          } else {
            Write-Warning "No unpacked directory found for verification"
          }

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Build Artifacts ==="
          if (Test-Path "dist-electron") {
            Get-ChildItem "dist-electron" -File | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  $($_.Name) - $sizeMB MB"
            }
          } else {
            Write-Error "No dist-electron directory found!"
          }

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Setup
          path: dist-electron/SAATIRIL-Fullset-*-Setup.exe
          if-no-files-found: warn

      - name: Upload Portable Executable
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-Portable
          path: dist-electron/SAATIRIL-Fullset-*-Portable.exe
          if-no-files-found: warn

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Fullset-All-Artifacts
          path: dist-electron/*
          if-no-files-found: warn
